<!DOCTYPE html>
<html>
<head>
  <title>Wav-View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #cesiumContainer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
window.onload = function () {

  Cesium.Ion.defaultAccessToken = 'YOUR_TOKEN';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    baseLayerPicker: false
  });

  // 🌍 Map
  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(
    new Cesium.OpenStreetMapImageryProvider({
      url: "https://a.tile.openstreetmap.org/"
    })
  );

  // 🇺🇸 USA View
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-98.5795, 39.8283, 2500000)
  });

  // =========================
  // 🌎 EARTHQUAKES
  // =========================
  fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson")
    .then(res => res.json())
    .then(data => {
      data.features.forEach(eq => {
        const c = eq.geometry.coordinates;
        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(c[0], c[1]),
          point: {
            pixelSize: 6,
            color: Cesium.Color.YELLOW
          },
          description: `<b>${eq.properties.place}</b><br>Mag: ${eq.properties.mag}`
        });
      });
    });

  // =========================
  // ✈️ REAL FLIGHTS (OpenSky)
  // =========================
  fetch("https://opensky-network.org/api/states/all")
    .then(res => res.json())
    .then(data => {
      data.states.slice(0, 50).forEach(flight => {
        if (!flight[5] || !flight[6]) return;

        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(flight[5], flight[6], flight[7] || 10000),
          billboard: {
            image: "https://img.icons8.com/ios-filled/50/00ffff/airplane-take-off.png",
            scale: 0.5
          },
          description: `
            <b>✈️ Flight</b><br>
            Callsign: ${flight[1] || "N/A"}<br>
            Country: ${flight[2]}<br>
            Altitude: ${flight[7] || "N/A"}
          `
        });
      });
    })
    .catch(() => console.log("Flight API blocked (CORS)"));

  // =========================
  // 🚢 SHIPS
  // =========================
  [
    [-90, 29],
    [-122, 37],
    [-74, 40]
  ].forEach(coord => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(coord[0], coord[1]),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/00ff00/ship.png",
        scale: 0.6
      },
      description: "🚢 Ship"
    });
  });

  // =========================
  // 🚨 NEWS EVENTS
  // =========================
  fetch(`https://newsapi.org/v2/everything?q=disaster OR explosion OR shooting&apiKey=a39135b91d48431ea24e6d90ca07d7b9`)
    .then(res => res.json())
    .then(data => {
      data.articles.slice(0, 8).forEach(article => {
        const lon = -125 + Math.random() * 50;
        const lat = 25 + Math.random() * 20;

        viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, lat),
          billboard: {
            image: "https://img.icons8.com/emoji/48/star-emoji.png",
            scale: 0.6
          },
          description: `<b>${article.title}</b><br><a href="${article.url}" target="_blank">Read</a>`
        });
      });
    });

  // =========================
  // 🛰️ SATELLITE
  // =========================
  let satLon = -100;
  const sat = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(satLon, 0, 400000),
    billboard: {
      image: "https://img.icons8.com/ios-filled/50/ffffff/satellite.png",
      scale: 0.6
    },
    description: "🛰️ Satellite"
  });

  setInterval(() => {
    satLon += 0.5;
    if (satLon > 180) satLon = -180;
    sat.position = Cesium.Cartesian3.fromDegrees(satLon, 0, 400000);
  }, 100);

  // =========================
  // 📡 NETWORK OUTAGES
  // =========================
  [
    { lon: -122, lat: 37, name: "West Coast Outage" },
    { lon: -74, lat: 40, name: "NYC ISP Issue" }
  ].forEach(e => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(e.lon, e.lat),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/ff0000/wifi-off.png",
        scale: 0.7
      },
      description: `<b>Network Outage</b><br>${e.name}`
    });
  });

};
</script>
</body>
</html>
