<!DOCTYPE html>
<html>
<head>
  <title>Wav-View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #cesiumContainer {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
window.onload = function () {

  Cesium.Ion.defaultAccessToken = 'YOUR_TOKEN';

  const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    baseLayerPicker: false
  });

  // 🌍 Map
  viewer.imageryLayers.removeAll();
  viewer.imageryLayers.addImageryProvider(
    new Cesium.OpenStreetMapImageryProvider({
      url: "https://a.tile.openstreetmap.org/"
    })
  );

  // 🇺🇸 Camera
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(-98.5795, 39.8283, 2500000)
  });

  // =========================
  // ✈️ REAL FLIGHTS (BACKEND)
  // =========================
  const flights = {};

  function updateFlights() {
    fetch("http://localhost:3000/flights")
      .then(res => res.json())
      .then(data => {

        data.states.forEach(f => {

          if (!f[5] || !f[6]) return;

          const id = f[0];

          const position = Cesium.Cartesian3.fromDegrees(f[5], f[6], f[7] || 10000);

          if (!flights[id]) {
            flights[id] = viewer.entities.add({
              position,
              billboard: {
                image: "https://img.icons8.com/ios-filled/50/00ffff/airplane-take-off.png",
                scale: 0.6
              },
              description: `<b>✈️ Flight</b><br>${f[1] || "N/A"}`
            });
          }

          flights[id].position = position;

        });

      });
  }

  updateFlights();
  setInterval(updateFlights, 15000);

  // =========================
  // 🛰️ MULTIPLE SATELLITES
  // =========================
  for (let i = 0; i < 5; i++) {
    let lon = -180 + (i * 60);

    const sat = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, 0, 400000),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/ffffff/satellite.png",
        scale: 0.6
      }
    });

    setInterval(() => {
      lon += 0.3;
      if (lon > 180) lon = -180;
      sat.position = Cesium.Cartesian3.fromDegrees(lon, 0, 400000);
    }, 100);
  }

  // =========================
  // 🚢 SHIPS (FIXED VISIBILITY)
  // =========================
  [
    [-90, 29],
    [-122, 37],
    [-74, 40]
  ].forEach(coord => {
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(coord[0], coord[1]),
      billboard: {
        image: "https://img.icons8.com/ios-filled/50/00ff00/ship.png",
        scale: 1.0 // 👈 bigger so you SEE them
      },
      description: "🚢 Ship"
    });
  });

};
</script>
</body>
</html>
